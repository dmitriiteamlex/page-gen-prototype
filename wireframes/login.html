<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Page Gen — Войти</title>
    <style>
        :root {
            --bg: #FFFFFF;
            --surface: #F5F5F5;
            --border: #E0E0E0;
            --text-primary: #333;
            --text-secondary: #666;
            --text-muted: #999;
            --btn-primary: #333;
            --btn-text: #FFF;
            --input-border: #CCC;
            --radius: 8px;
        }

        *, *::before, *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: var(--surface);
            color: var(--text-primary);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 24px;
        }

        .card {
            background: var(--bg);
            border: 1px solid var(--border);
            border-radius: 12px;
            max-width: 400px;
            width: 100%;
            padding: 40px 32px;
        }

        .logo {
            text-align: center;
            font-size: 22px;
            font-weight: 700;
            color: var(--text-primary);
            letter-spacing: -0.5px;
            margin-bottom: 8px;
        }

        .title {
            text-align: center;
            font-size: 18px;
            font-weight: 600;
            color: var(--text-primary);
            margin-bottom: 28px;
        }

        .btn-google {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            width: 100%;
            height: 44px;
            background: var(--bg);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            font-family: inherit;
            font-size: 14px;
            font-weight: 500;
            color: var(--text-primary);
            cursor: pointer;
            transition: background 0.15s;
        }

        .btn-google:hover {
            background: var(--surface);
        }

        .btn-google svg {
            width: 18px;
            height: 18px;
            flex-shrink: 0;
        }

        .separator {
            display: flex;
            align-items: center;
            gap: 16px;
            margin: 24px 0;
        }

        .separator::before,
        .separator::after {
            content: '';
            flex: 1;
            height: 1px;
            background: var(--border);
        }

        .separator span {
            font-size: 13px;
            color: var(--text-muted);
        }

        .field {
            margin-bottom: 16px;
        }

        .field label {
            display: block;
            font-size: 13px;
            font-weight: 500;
            color: var(--text-secondary);
            margin-bottom: 6px;
        }

        .field input {
            display: block;
            width: 100%;
            height: 44px;
            padding: 0 12px;
            font-family: inherit;
            font-size: 14px;
            color: var(--text-primary);
            background: var(--bg);
            border: 1px solid var(--input-border);
            border-radius: var(--radius);
            outline: none;
            transition: border-color 0.15s;
        }

        .field input::placeholder {
            color: var(--text-muted);
        }

        .field input:focus {
            border-color: var(--text-secondary);
        }

        .btn-primary {
            display: block;
            width: 100%;
            height: 44px;
            margin-top: 24px;
            background: var(--btn-primary);
            color: var(--btn-text);
            border: none;
            border-radius: var(--radius);
            font-family: inherit;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: opacity 0.15s;
        }

        .btn-primary:hover {
            opacity: 0.85;
        }

        .footer-link {
            display: block;
            text-align: center;
            margin-top: 20px;
            font-size: 13px;
            color: var(--text-muted);
        }

        .footer-link a {
            color: var(--text-primary);
            text-decoration: none;
            font-weight: 500;
        }

        .footer-link a:hover {
            text-decoration: underline;
        }

        @media (max-width: 480px) {
            body {
                padding: 16px;
            }
            .card {
                padding: 32px 20px;
            }
        }
    </style>
</head>
<body>
    <div class="card">
        <div class="logo">Page Gen</div>
        <h1 class="title">Войти в аккаунт</h1>

        <button class="btn-google" type="button">
            <svg viewBox="0 0 24 24" fill="none">
                <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92a5.06 5.06 0 0 1-2.2 3.32v2.77h3.57c2.08-1.92 3.27-4.74 3.27-8.1z" fill="#999"/>
                <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#AAA"/>
                <path d="M5.84 14.09a6.97 6.97 0 0 1 0-4.17V7.08H2.18A11.96 11.96 0 0 0 1 12c0 1.94.46 3.77 1.18 5.42l3.66-2.84z" fill="#BBB"/>
                <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#CCC"/>
            </svg>
            Войти через Google
        </button>

        <div class="separator"><span>или</span></div>

        <form onsubmit="return false;">
            <div class="field">
                <label for="email">Email</label>
                <input type="email" id="email" placeholder="you@example.com">
            </div>
            <div class="field">
                <label for="password">Пароль</label>
                <input type="password" id="password" placeholder="********">
            </div>
            <button class="btn-primary" type="submit">Войти</button>
        </form>

        <p class="footer-link">Нет аккаунта? <a href="#">Зарегистрироваться</a></p>
    </div>
</body>
</html>
