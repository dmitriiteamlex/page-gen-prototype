<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dashboard — Page Gen</title>
<style>
  :root {
    --bg: #FFFFFF;
    --surface: #F5F5F5;
    --border: #E0E0E0;
    --text-primary: #333;
    --text-secondary: #666;
    --text-muted: #999;
    --btn-primary: #333;
    --btn-text: #FFF;
    --radius: 8px;
  }

  *, *::before, *::after {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
  }

  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    background: #FAFAFA;
    color: var(--text-primary);
    line-height: 1.5;
    min-height: 100vh;
  }

  /* ── Header ── */
  .header {
    position: sticky;
    top: 0;
    z-index: 100;
    background: var(--bg);
    border-bottom: 1px solid var(--border);
    height: 60px;
    display: flex;
    align-items: center;
    padding: 0 24px;
  }

  .header-inner {
    width: 100%;
    max-width: 1100px;
    margin: 0 auto;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }

  .logo {
    font-size: 18px;
    font-weight: 700;
    color: var(--text-primary);
    text-decoration: none;
    letter-spacing: -0.3px;
    white-space: nowrap;
  }

  .nav {
    display: flex;
    align-items: center;
    gap: 28px;
  }

  .nav a {
    font-size: 14px;
    color: var(--text-secondary);
    text-decoration: none;
    padding: 4px 0;
    transition: color 0.15s;
  }

  .nav a:hover {
    color: var(--text-primary);
  }

  .nav a.active {
    color: var(--text-primary);
    font-weight: 600;
    border-bottom: 2px solid var(--text-primary);
  }

  .logout-btn {
    font-size: 14px;
    color: var(--text-muted);
    text-decoration: none;
    background: none;
    border: none;
    cursor: pointer;
    transition: color 0.15s;
  }

  .logout-btn:hover {
    color: var(--text-primary);
  }

  /* ── Main ── */
  .main {
    max-width: 1100px;
    margin: 0 auto;
    padding: 40px 24px 80px;
  }

  .title-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 32px;
    flex-wrap: wrap;
    gap: 16px;
  }

  .title-row h1 {
    font-size: 24px;
    font-weight: 700;
    color: var(--text-primary);
  }

  .btn-new {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    background: var(--btn-primary);
    color: var(--btn-text);
    font-size: 14px;
    font-weight: 500;
    padding: 10px 20px;
    border: none;
    border-radius: var(--radius);
    cursor: pointer;
    text-decoration: none;
    transition: background 0.15s;
  }

  .btn-new:hover {
    background: #222;
  }

  /* ── Cards Grid ── */
  .grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 20px;
  }

  .card {
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 24px;
    text-decoration: none;
    color: inherit;
    display: flex;
    flex-direction: column;
    gap: 8px;
    transition: border-color 0.15s, box-shadow 0.15s;
    position: relative;
  }

  .card:hover {
    border-color: #BDBDBD;
    box-shadow: 0 2px 8px rgba(0, 0, 0, 0.06);
  }

  .card-top {
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
  }

  .card-title {
    font-size: 16px;
    font-weight: 600;
    color: var(--text-primary);
  }

  .card-menu {
    background: none;
    border: none;
    font-size: 20px;
    color: var(--text-muted);
    cursor: pointer;
    padding: 0 4px;
    line-height: 1;
    letter-spacing: 1px;
    transition: color 0.15s;
    position: relative;
    z-index: 2;
  }

  .card-menu:hover {
    color: var(--text-primary);
  }

  .card-subtitle {
    font-size: 14px;
    color: var(--text-secondary);
  }

  .card-meta {
    font-size: 13px;
    color: var(--text-muted);
    margin-top: 4px;
  }

  /* ── Responsive ── */
  @media (max-width: 820px) {
    .grid {
      grid-template-columns: repeat(2, 1fr);
    }
  }

  @media (max-width: 560px) {
    .grid {
      grid-template-columns: 1fr;
    }

    .header-inner {
      gap: 12px;
    }

    .nav {
      gap: 16px;
    }

    .title-row h1 {
      font-size: 20px;
    }
  }
</style>
</head>
<body>

<!-- Header -->
<header class="header">
  <div class="header-inner">
    <a href="index.html" class="logo">Page Gen</a>
    <nav class="nav">
      <a href="dashboard.html" class="active">Dashboard</a>
      <a href="settings.html">Settings</a>
    </nav>
    <a href="index.html" class="logout-btn">Logout</a>
  </div>
</header>

<!-- Main -->
<main class="main">
  <div class="title-row">
    <h1>Мои проекты</h1>
    <a href="#" class="btn-new">+ Новый проект</a>
  </div>

  <div class="grid">

    <!-- Card 1 -->
    <a href="project.html" class="card">
      <div class="card-top">
        <span class="card-title">Corporate Site</span>
        <button class="card-menu" onclick="event.preventDefault()">...</button>
      </div>
      <span class="card-subtitle">Корпоративный сайт</span>
      <span class="card-meta">3 шаблона</span>
    </a>

    <!-- Card 2 -->
    <a href="project.html" class="card">
      <div class="card-top">
        <span class="card-title">E-commerce</span>
        <button class="card-menu" onclick="event.preventDefault()">...</button>
      </div>
      <span class="card-subtitle">Интернет-магазин</span>
      <span class="card-meta">5 шаблонов</span>
    </a>

    <!-- Card 3 -->
    <a href="project.html" class="card">
      <div class="card-top">
        <span class="card-title">Landing Page</span>
        <button class="card-menu" onclick="event.preventDefault()">...</button>
      </div>
      <span class="card-subtitle">Лендинг услуг</span>
      <span class="card-meta">1 шаблон</span>
    </a>

  </div>
</main>

</body>
</html>
