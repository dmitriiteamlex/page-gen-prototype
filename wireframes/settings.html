<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Settings — Page Gen</title>
<style>
  :root {
    --bg: #FFFFFF;
    --surface: #F5F5F5;
    --border: #E0E0E0;
    --text-primary: #333;
    --text-secondary: #666;
    --text-muted: #999;
    --btn-primary: #333;
    --btn-text: #FFF;
    --radius: 8px;
  }

  *, *::before, *::after {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
  }

  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    background: #FAFAFA;
    color: var(--text-primary);
    line-height: 1.5;
    min-height: 100vh;
  }

  /* ── Header ── */
  .header {
    position: sticky;
    top: 0;
    z-index: 100;
    background: var(--bg);
    border-bottom: 1px solid var(--border);
    height: 60px;
    display: flex;
    align-items: center;
    padding: 0 24px;
  }

  .header-inner {
    width: 100%;
    max-width: 1100px;
    margin: 0 auto;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }

  .logo {
    font-size: 18px;
    font-weight: 700;
    color: var(--text-primary);
    text-decoration: none;
    letter-spacing: -0.3px;
    white-space: nowrap;
  }

  .nav {
    display: flex;
    align-items: center;
    gap: 28px;
  }

  .nav a {
    font-size: 14px;
    color: var(--text-secondary);
    text-decoration: none;
    padding: 4px 0;
    transition: color 0.15s;
  }

  .nav a:hover {
    color: var(--text-primary);
  }

  .nav a.active {
    color: var(--text-primary);
    font-weight: 600;
    border-bottom: 2px solid var(--text-primary);
  }

  .back-link {
    font-size: 14px;
    color: var(--text-muted);
    text-decoration: none;
    transition: color 0.15s;
  }

  .back-link:hover {
    color: var(--text-primary);
  }

  /* ── Main ── */
  .main {
    max-width: 600px;
    margin: 0 auto;
    padding: 40px 24px 80px;
  }

  /* ── Sections ── */
  .section-title {
    font-size: 18px;
    font-weight: 600;
    color: var(--text-primary);
    margin-bottom: 24px;
  }

  .divider {
    border: none;
    border-top: 1px solid #CCC;
    margin: 32px 0;
  }

  /* ── Form ── */
  .form-group {
    margin-bottom: 20px;
  }

  .form-label {
    display: block;
    font-size: 13px;
    font-weight: 500;
    color: var(--text-secondary);
    margin-bottom: 6px;
  }

  .form-input {
    width: 100%;
    height: 44px;
    padding: 0 14px;
    font-size: 14px;
    font-family: inherit;
    color: var(--text-primary);
    background: var(--bg);
    border: 1px solid #CCC;
    border-radius: var(--radius);
    outline: none;
    transition: border-color 0.15s;
  }

  .form-input:focus {
    border-color: #999;
  }

  .form-input::placeholder {
    color: var(--text-muted);
  }

  .form-input.placeholder-style {
    color: var(--text-muted);
  }

  /* ── Input with toggle ── */
  .input-wrapper {
    position: relative;
  }

  .input-wrapper .form-input {
    padding-right: 60px;
  }

  .input-toggle {
    position: absolute;
    right: 14px;
    top: 50%;
    transform: translateY(-50%);
    font-size: 13px;
    font-weight: 500;
    color: var(--text-secondary);
    background: none;
    border: none;
    cursor: pointer;
    padding: 0;
    transition: color 0.15s;
  }

  .input-toggle:hover {
    color: var(--text-primary);
  }

  /* ── Help link ── */
  .help-link {
    display: inline-block;
    font-size: 13px;
    color: #5555AA;
    text-decoration: none;
    margin-top: 6px;
    transition: color 0.15s;
  }

  .help-link:hover {
    color: #333388;
    text-decoration: underline;
  }

  /* ── Button ── */
  .btn-primary {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    background: var(--btn-primary);
    color: var(--btn-text);
    font-size: 14px;
    font-weight: 500;
    font-family: inherit;
    padding: 10px 24px;
    border: none;
    border-radius: var(--radius);
    cursor: pointer;
    transition: background 0.15s;
    margin-top: 4px;
  }

  .btn-primary:hover {
    background: #222;
  }

  /* ── Responsive ── */
  @media (max-width: 560px) {
    .header-inner {
      gap: 12px;
    }

    .nav {
      gap: 16px;
    }

    .main {
      padding: 32px 16px 60px;
    }
  }
</style>
</head>
<body>

<!-- Header -->
<header class="header">
  <div class="header-inner">
    <a href="index.html" class="logo">Page Gen</a>
    <nav class="nav">
      <a href="dashboard.html">Dashboard</a>
      <a href="settings.html" class="active">Settings</a>
    </nav>
    <a href="dashboard.html" class="back-link">&larr; Dashboard</a>
  </div>
</header>

<!-- Main -->
<main class="main">

  <!-- Section 1: Profile -->
  <h2 class="section-title">Профиль</h2>

  <div class="form-group">
    <label class="form-label">Имя</label>
    <input type="text" class="form-input" value="Dmitrii">
  </div>

  <div class="form-group">
    <label class="form-label">Email</label>
    <input type="email" class="form-input" value="dima@teamlex.com">
  </div>

  <button class="btn-primary">Сохранить</button>

  <!-- Divider -->
  <hr class="divider">

  <!-- Section 2: API Keys -->
  <h2 class="section-title">API-ключи</h2>

  <div class="form-group">
    <label class="form-label">OpenAI API Key</label>
    <div class="input-wrapper">
      <input type="text" class="form-input" value="sk-...7xQ4" readonly>
      <button class="input-toggle">Show</button>
    </div>
    <a href="#" class="help-link">Где найти ключ?</a>
  </div>

  <div class="form-group">
    <label class="form-label">NanoBanana API Key</label>
    <div class="input-wrapper">
      <input type="text" class="form-input placeholder-style" value="Не указан" readonly>
    </div>
    <a href="#" class="help-link">Где найти ключ?</a>
  </div>

  <button class="btn-primary">Сохранить ключи</button>

</main>

</body>
</html>
