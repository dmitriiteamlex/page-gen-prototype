<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Page Gen — Регистрация</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>⚡</text></svg>">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet">
  <script src="https://unpkg.com/lucide@latest"></script>
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    :root {
      --bg: #000000;
      --surface: #191919;
      --surface-hover: #222222;
      --border: #333333;
      --text-primary: #ffffff;
      --text-secondary: #868585;
      --text-muted: #555555;
      --btn-primary: #ffd955;
      --btn-primary-hover: #e6c34d;
      --btn-text: #000000;
      --accent: #d727c6;
      --tertiary: #cf8eff;
      --success: #0ab95a;
      --destructive: #d80303;
      --input-bg: #0a0a0c;
      --input-border: #333333;
      --input-focus: #ffd955;
      --radius: 8px;
      --radius-lg: 12px;
      --shadow-md: 0 4px 12px rgba(0,0,0,0.4);
    }
    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--bg);
      color: var(--text-primary);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
      -webkit-font-smoothing: antialiased;
    }
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(12px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .card {
      width: 100%;
      max-width: 420px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 40px;
      box-shadow: var(--shadow-md);
      animation: fadeIn 0.5s ease-out both;
    }
    .logo {
      display: flex;
      align-items: center;
      gap: 2px;
      margin-bottom: 32px;
      text-decoration: none;
      color: inherit;
    }
    .logo-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--btn-primary);
      flex-shrink: 0;
      margin-right: 6px;
    }
    .logo-text {
      font-family: 'Space Grotesk', sans-serif;
      font-size: 24px;
      font-weight: 700;
      color: var(--text-primary);
      letter-spacing: -0.02em;
    }
    .title {
      font-family: 'Space Grotesk', sans-serif;
      font-size: 22px;
      font-weight: 600;
      color: var(--text-primary);
      margin-bottom: 28px;
    }
    .btn-google {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      width: 100%;
      height: 46px;
      background: transparent;
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      color: var(--text-primary);
      font-family: 'DM Sans', sans-serif;
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      transition: border-color 200ms ease-out, background 200ms ease-out;
    }
    .btn-google:hover { border-color: rgba(255,217,85,0.3); background: var(--surface-hover); }
    .btn-google:focus-visible { outline: 2px solid var(--input-focus); outline-offset: 2px; }
    .btn-google svg { width: 18px; height: 18px; flex-shrink: 0; }
    .separator {
      display: flex;
      align-items: center;
      gap: 16px;
      margin: 24px 0;
    }
    .separator-line { flex: 1; height: 1px; background: var(--border); }
    .separator-text { font-size: 13px; color: var(--text-muted); user-select: none; }
    .field { margin-bottom: 20px; }
    .field-label {
      display: block;
      font-size: 13px;
      font-weight: 500;
      color: var(--text-secondary);
      margin-bottom: 8px;
    }
    .field-label .required { color: var(--destructive); margin-left: 2px; }
    .field-input {
      width: 100%;
      height: 44px;
      padding: 0 14px;
      background: var(--input-bg);
      border: 1px solid var(--input-border);
      border-radius: var(--radius);
      color: var(--text-primary);
      font-family: 'DM Sans', sans-serif;
      font-size: 14px;
      transition: border-color 200ms, box-shadow 200ms;
    }
    .field-input::placeholder { color: var(--text-muted); }
    .field-input:hover { border-color: #444; }
    .field-input:focus {
      outline: none;
      border-color: var(--input-focus);
      box-shadow: 0 0 0 3px rgba(255,217,85,0.12);
    }
    .field-input.invalid {
      border-color: var(--destructive);
      box-shadow: 0 0 0 3px rgba(216,3,3,0.1);
    }
    .field-error {
      display: none;
      font-size: 12px;
      color: var(--destructive);
      margin-top: 6px;
    }
    .password-wrapper { position: relative; }
    .password-wrapper .field-input { padding-right: 44px; }
    .password-toggle {
      position: absolute;
      right: 12px;
      top: 50%;
      transform: translateY(-50%);
      background: none;
      border: none;
      color: var(--text-muted);
      cursor: pointer;
      padding: 2px;
      display: flex;
      transition: color 200ms;
    }
    .password-toggle:hover { color: var(--text-secondary); }
    .password-toggle:focus-visible { outline: 2px solid var(--input-focus); outline-offset: 2px; border-radius: 4px; }
    .password-toggle svg { width: 18px; height: 18px; }
    .btn-primary {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 100%;
      height: 46px;
      background: var(--btn-primary);
      border: none;
      border-radius: var(--radius-lg);
      color: var(--btn-text);
      font-family: 'DM Sans', sans-serif;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      margin-top: 28px;
      transition: background 200ms, transform 200ms;
    }
    .btn-primary:hover { background: var(--btn-primary-hover); transform: translateY(-1px); }
    .btn-primary:active { transform: translateY(0); }
    .btn-primary:focus-visible { outline: 2px solid var(--input-focus); outline-offset: 2px; }
    .btn-primary:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }
    .footer-link {
      text-align: center;
      margin-top: 24px;
      font-size: 13px;
      color: var(--text-secondary);
    }
    .footer-link a {
      color: var(--tertiary);
      text-decoration: none;
      font-weight: 500;
      transition: color 200ms;
    }
    .footer-link a:hover { color: #dda6ff; }
    .footer-link a:focus-visible { outline: 2px solid var(--input-focus); outline-offset: 2px; border-radius: 4px; }
  </style>
</head>
<body>
  <div class="card">
    <a href="dashboard.html" class="logo">
      <span class="logo-dot"></span>
      <span class="logo-text">Page Gen</span>
    </a>
    <h1 class="title">Создать аккаунт</h1>

    <button class="btn-google" type="button" onclick="showToast('Google OAuth — демо-режим', 'info')">
      <svg viewBox="0 0 24 24" fill="none">
        <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92a5.06 5.06 0 0 1-2.2 3.32v2.77h3.57c2.08-1.92 3.27-4.74 3.27-8.1Z" fill="#4285F4"/>
        <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23Z" fill="#34A853"/>
        <path d="M5.84 14.09A6.7 6.7 0 0 1 5.5 12c0-.72.12-1.42.35-2.09V7.07H2.18A11 11 0 0 0 1 12c0 1.77.43 3.45 1.18 4.93l3.66-2.84Z" fill="#FBBC05"/>
        <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53Z" fill="#EA4335"/>
      </svg>
      Продолжить через Google
    </button>

    <div class="separator">
      <div class="separator-line"></div>
      <span class="separator-text">или</span>
      <div class="separator-line"></div>
    </div>

    <form id="registerForm" autocomplete="off" onsubmit="event.preventDefault(); handleRegister();">
      <div class="field">
        <label class="field-label" for="name">Имя <span class="required">*</span></label>
        <input class="field-input" type="text" id="name" name="name" placeholder="Ваше имя" required autofocus>
        <div class="field-error" id="name-error">Введите имя</div>
      </div>
      <div class="field">
        <label class="field-label" for="email">Email <span class="required">*</span></label>
        <input class="field-input" type="email" id="email" name="email" placeholder="name@example.com" required>
        <div class="field-error" id="email-error">Введите корректный email</div>
      </div>
      <div class="field">
        <label class="field-label" for="password">Пароль <span class="required">*</span></label>
        <div class="password-wrapper">
          <input class="field-input" type="password" id="password" name="password" placeholder="Минимум 8 символов" required minlength="8">
          <button class="password-toggle" type="button" aria-label="Показать пароль" onclick="togglePassword('password', this)">
            <i data-lucide="eye"></i>
          </button>
        </div>
        <div class="field-error" id="password-error">Минимум 8 символов</div>
      </div>
      <button class="btn-primary" type="submit" id="submitBtn" disabled>Зарегистрироваться</button>
    </form>

    <p class="footer-link">
      Уже есть аккаунт? <a href="login.html">Войти</a>
    </p>
  </div>

  <script src="components/toasts.js"></script>
  <script>
    lucide.createIcons();

    function togglePassword(inputId, btn) {
      const input = document.getElementById(inputId);
      const icon = btn.querySelector('i');
      if (input.type === 'password') {
        input.type = 'text';
        icon.setAttribute('data-lucide', 'eye-off');
      } else {
        input.type = 'password';
        icon.setAttribute('data-lucide', 'eye');
      }
      lucide.createIcons();
    }

    // Form validation
    const form = document.getElementById('registerForm');
    const submitBtn = document.getElementById('submitBtn');
    const fields = form.querySelectorAll('[required]');

    fields.forEach(input => {
      input.addEventListener('input', () => {
        const allFilled = [...fields].every(i => i.value.trim());
        submitBtn.disabled = !allFilled;
        if (input.value.trim()) {
          input.classList.remove('invalid');
          const err = document.getElementById(input.id + '-error');
          if (err) err.style.display = 'none';
        }
      });
      input.addEventListener('blur', () => {
        if (!input.value.trim() && input.hasAttribute('required')) {
          input.classList.add('invalid');
          const err = document.getElementById(input.id + '-error');
          if (err) err.style.display = 'block';
        }
      });
    });

    function handleRegister() {
      showToast('Аккаунт создан! Перенаправляем...', 'success');
      setTimeout(() => location.href = 'dashboard.html', 1500);
    }

    // Keyboard
    document.addEventListener('keydown', (e) => {
      if (e.key === 'Escape') {
        document.querySelectorAll('.modal-backdrop[style*="display: flex"]')
          .forEach(m => closeModal(m.dataset.modal));
      }
    });
  </script>
</body>
</html>
