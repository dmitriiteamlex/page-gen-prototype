<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>404 — Page Gen</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>⚡</text></svg>">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #000000;
      --surface: #191919;
      --border: #333333;
      --text-primary: #ffffff;
      --text-secondary: #868585;
      --text-muted: #555555;
      --btn-primary: #ffd955;
      --btn-text: #000000;
      --accent: #d727c6;
      --radius-lg: 12px;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--bg);
      color: var(--text-primary);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }
    .container {
      text-align: center;
      animation: fadeIn 0.5s ease-out;
    }
    .code {
      font-family: 'Space Grotesk', sans-serif;
      font-size: 120px;
      font-weight: 700;
      color: var(--text-muted);
      line-height: 1;
      margin-bottom: 16px;
      opacity: 0.3;
    }
    .title {
      font-family: 'Space Grotesk', sans-serif;
      font-size: 28px;
      font-weight: 600;
      margin-bottom: 12px;
    }
    .desc {
      font-size: 16px;
      color: var(--text-secondary);
      margin-bottom: 32px;
    }
    .btn-home {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 12px 24px;
      background: var(--btn-primary);
      color: var(--btn-text);
      font-family: 'DM Sans', sans-serif;
      font-size: 15px;
      font-weight: 600;
      border: none;
      border-radius: var(--radius-lg);
      cursor: pointer;
      text-decoration: none;
      transition: all 200ms ease-out;
    }
    .btn-home:hover {
      transform: translateY(-1px);
      box-shadow: 0 4px 16px rgba(255,217,85,0.3);
    }
    .btn-home:focus-visible {
      outline: 2px solid var(--btn-primary);
      outline-offset: 2px;
    }
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(12px); }
      to { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="code">404</div>
    <h1 class="title">Страница не найдена</h1>
    <p class="desc">Возможно, она была перемещена или удалена.</p>
    <a href="dashboard.html" class="btn-home">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m3 9 9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
      На главную
    </a>
  </div>
</body>
</html>
