<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Настройки — Page Gen</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>⚡</text></svg>">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet">
  <script src="https://unpkg.com/lucide@latest"></script>
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    :root {
      --bg: #000; --surface: #191919; --surface-hover: #222;
      --border: #333; --text-primary: #fff; --text-secondary: #868585;
      --text-muted: #555; --btn-primary: #ffd955; --btn-primary-hover: #e6c34d;
      --btn-text: #000; --accent: #d727c6; --tertiary: #cf8eff;
      --input-bg: #0a0a0c; --input-border: #333; --input-focus: #ffd955;
      --destructive: #d80303; --success: #0ab95a;
      --radius: 8px; --radius-lg: 12px; --shadow-md: 0 4px 12px rgba(0,0,0,0.4);
    }
    body { font-family: 'DM Sans', sans-serif; background: var(--bg); color: var(--text-primary); min-height: 100vh; -webkit-font-smoothing: antialiased; }

    /* ── Header ── */
    .header { position: sticky; top: 0; z-index: 100; background: rgba(0,0,0,0.85); backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px); border-bottom: 1px solid var(--border); }
    .header-inner { max-width: 1100px; margin: 0 auto; padding: 0 32px; height: 56px; display: flex; align-items: center; justify-content: space-between; }
    .logo { font-family: 'Space Grotesk', sans-serif; font-size: 18px; font-weight: 700; color: var(--text-primary); text-decoration: none; display: flex; align-items: center; gap: 8px; }
    .logo:focus-visible { outline: 2px solid var(--input-focus); outline-offset: 4px; border-radius: 4px; }
    .logo-mark { width: 24px; height: 24px; background: var(--btn-primary); border-radius: 6px; display: flex; align-items: center; justify-content: center; }
    .logo-mark svg { width: 14px; height: 14px; color: var(--btn-text); }
    .header-nav { display: flex; align-items: center; gap: 4px; }
    .header-nav a { font-size: 14px; color: var(--text-secondary); text-decoration: none; padding: 6px 14px; border-radius: var(--radius); transition: color 0.2s, background 0.2s; }
    .header-nav a:hover { color: var(--text-primary); background: rgba(255,255,255,0.05); }
    .header-nav a:focus-visible { outline: 2px solid var(--input-focus); outline-offset: 2px; }
    .header-nav a.active { color: var(--text-primary); background: rgba(255,255,255,0.08); }
    .nav-divider { width: 1px; height: 20px; background: var(--border); margin: 0 8px; }
    .avatar { width: 32px; height: 32px; border-radius: 50%; background: var(--accent); display: flex; align-items: center; justify-content: center; font-size: 12px; font-weight: 600; color: #fff; cursor: pointer; text-decoration: none; transition: opacity 0.2s; }
    .avatar:hover { opacity: 0.85; }
    .logout-link { color: var(--text-muted) !important; font-size: 13px !important; }
    .logout-link:hover { color: var(--destructive) !important; }

    /* ── Main ── */
    .main { max-width: 600px; margin: 0 auto; padding: 48px 32px; animation: fadeIn 400ms ease-out both; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(12px); } to { opacity: 1; transform: translateY(0); } }
    .page-title { font-family: 'Space Grotesk', sans-serif; font-size: 28px; font-weight: 700; }
    .section-title { font-family: 'Space Grotesk', sans-serif; font-size: 20px; font-weight: 600; margin-top: 32px; margin-bottom: 20px; }
    .divider { border: none; border-top: 1px solid var(--border); margin: 40px 0; }

    /* ── Form ── */
    .field { margin-bottom: 20px; }
    .field label { display: block; font-size: 13px; font-weight: 500; color: var(--text-secondary); margin-bottom: 6px; }
    .field label .req { color: var(--destructive); margin-left: 2px; }
    .field input[type="text"],
    .field input[type="email"],
    .field input[type="password"] {
      width: 100%; height: 44px; background: var(--input-bg); border: 1px solid var(--input-border); border-radius: var(--radius-lg); padding: 0 14px; font-family: 'DM Sans', sans-serif; font-size: 14px; color: var(--text-primary); outline: none; transition: border-color 200ms, box-shadow 200ms;
    }
    .field input:focus { border-color: var(--input-focus); box-shadow: 0 0 0 3px rgba(255,217,85,0.15); }
    .field input::placeholder { color: var(--text-muted); }
    .field-error { display: none; font-size: 12px; color: var(--destructive); margin-top: 6px; }

    /* ── API key input ── */
    .input-wrapper { position: relative; }
    .input-wrapper input { padding-right: 100px; }
    .input-wrapper input.monospace { font-family: 'DM Sans', monospace; color: var(--text-secondary); letter-spacing: 0.02em; }
    .input-actions { position: absolute; right: 8px; top: 50%; transform: translateY(-50%); display: flex; gap: 4px; }
    .toggle-show, .copy-btn {
      display: inline-flex; align-items: center; gap: 4px; background: none; border: none; cursor: pointer; font-family: 'DM Sans', sans-serif; font-size: 12px; color: var(--text-secondary); transition: color 200ms; padding: 4px;
    }
    .toggle-show:hover, .copy-btn:hover { color: var(--text-primary); }
    .toggle-show:focus-visible, .copy-btn:focus-visible { outline: 2px solid var(--input-focus); outline-offset: 2px; border-radius: 4px; }
    .toggle-show i, .copy-btn i { width: 14px; height: 14px; }

    /* ── Helper link ── */
    .helper-link { display: inline-flex; align-items: center; gap: 4px; margin-top: 8px; font-size: 12px; color: var(--tertiary); text-decoration: none; transition: color 200ms; }
    .helper-link:hover { text-decoration: underline; }
    .helper-link:focus-visible { outline: 2px solid var(--input-focus); outline-offset: 2px; border-radius: 4px; }
    .helper-link i { width: 12px; height: 12px; }

    /* ── Button ── */
    .btn-save {
      display: inline-flex; align-items: center; justify-content: center; gap: 8px; background: var(--btn-primary); color: var(--btn-text); font-family: 'DM Sans', sans-serif; font-size: 14px; font-weight: 600; padding: 10px 24px; border: none; border-radius: var(--radius-lg); cursor: pointer; transition: background 200ms, transform 200ms; margin-top: 8px;
    }
    .btn-save:hover { background: var(--btn-primary-hover); }
    .btn-save:active { transform: scale(0.97); }
    .btn-save:focus-visible { outline: 2px solid var(--input-focus); outline-offset: 2px; }
    .btn-save:disabled { opacity: 0.5; cursor: not-allowed; }

    /* ── Responsive ── */
    @media (max-width: 640px) {
      .header-inner { padding: 0 16px; }
      .main { padding: 32px 16px; }
      .page-title { font-size: 24px; }
      .section-title { font-size: 18px; }
    }
  </style>
</head>
<body>

  <!-- Header -->
  <header class="header">
    <div class="header-inner">
      <a href="dashboard.html" class="logo">
        <div class="logo-mark"><i data-lucide="zap"></i></div>
        Page Gen
      </a>
      <nav class="header-nav">
        <a href="dashboard.html">Проекты</a>
        <a href="settings.html" class="active">Настройки</a>
        <div class="nav-divider"></div>
        <a href="settings.html" class="avatar" title="Настройки профиля">ДП</a>
        <a href="login.html" class="logout-link">Выйти</a>
      </nav>
    </div>
  </header>

  <!-- Main -->
  <main class="main">
    <h1 class="page-title">Настройки</h1>

    <!-- Profile -->
    <h2 class="section-title">Профиль</h2>
    <form id="profileForm" onsubmit="event.preventDefault(); saveProfile();">
      <div class="field">
        <label for="name">Имя <span class="req">*</span></label>
        <input type="text" id="name" value="Dmitrii" required>
        <div class="field-error" id="name-error">Введите имя</div>
      </div>
      <div class="field">
        <label for="email">Email <span class="req">*</span></label>
        <input type="email" id="email" value="dima@teamlex.com" required>
        <div class="field-error" id="email-error">Введите корректный email</div>
      </div>
      <button type="submit" class="btn-save" id="profileSaveBtn">Сохранить</button>
    </form>

    <hr class="divider">

    <!-- API Keys -->
    <h2 class="section-title">API-ключи</h2>
    <form id="keysForm" onsubmit="event.preventDefault(); saveKeys();">
      <div class="field">
        <label for="openai-key">OpenAI API Key</label>
        <div class="input-wrapper">
          <input type="password" id="openai-key" class="monospace" value="sk-proj-abc123def456ghi789jklmno7xQ4">
          <div class="input-actions">
            <button type="button" class="copy-btn" title="Копировать" onclick="copyKey('openai-key')">
              <i data-lucide="clipboard"></i>
            </button>
            <button type="button" class="toggle-show" onclick="toggleKey('openai-key', this)">
              <i data-lucide="eye"></i>
              <span>Show</span>
            </button>
          </div>
        </div>
        <a href="https://platform.openai.com/api-keys" target="_blank" rel="noopener" class="helper-link">
          Где найти ключ? <i data-lucide="external-link"></i>
        </a>
      </div>

      <div class="field">
        <label for="nanobanana-key">NanoBanana API Key</label>
        <div class="input-wrapper">
          <input type="password" id="nanobanana-key" placeholder="Не указан">
          <div class="input-actions">
            <button type="button" class="copy-btn" title="Копировать" onclick="copyKey('nanobanana-key')">
              <i data-lucide="clipboard"></i>
            </button>
            <button type="button" class="toggle-show" onclick="toggleKey('nanobanana-key', this)">
              <i data-lucide="eye"></i>
              <span>Show</span>
            </button>
          </div>
        </div>
        <a href="https://nanobanana.com/api-keys" target="_blank" rel="noopener" class="helper-link">
          Где найти ключ? <i data-lucide="external-link"></i>
        </a>
      </div>

      <button type="submit" class="btn-save">Сохранить ключи</button>
    </form>
  </main>

  <script src="components/toasts.js"></script>
  <script>
    lucide.createIcons();

    // Toggle API key visibility
    function toggleKey(inputId, btn) {
      const input = document.getElementById(inputId);
      const icon = btn.querySelector('i');
      const label = btn.querySelector('span');
      if (input.type === 'password') {
        input.type = 'text';
        label.textContent = 'Hide';
        icon.setAttribute('data-lucide', 'eye-off');
      } else {
        input.type = 'password';
        label.textContent = 'Show';
        icon.setAttribute('data-lucide', 'eye');
      }
      lucide.createIcons();
    }

    // Copy key
    function copyKey(inputId) {
      const input = document.getElementById(inputId);
      if (!input.value || input.value === input.placeholder) {
        showToast('Ключ не указан', 'error');
        return;
      }
      navigator.clipboard.writeText(input.value).then(() => {
        showToast('Ключ скопирован', 'success');
      }).catch(() => {
        showToast('Не удалось скопировать', 'error');
      });
    }

    // Save profile
    function saveProfile() {
      const name = document.getElementById('name');
      const email = document.getElementById('email');
      let valid = true;
      if (!name.value.trim()) {
        name.style.borderColor = 'var(--destructive)';
        document.getElementById('name-error').style.display = 'block';
        valid = false;
      }
      if (!email.value.trim()) {
        email.style.borderColor = 'var(--destructive)';
        document.getElementById('email-error').style.display = 'block';
        valid = false;
      }
      if (valid) {
        showToast('Профиль сохранён', 'success');
      }
    }

    // Save keys
    function saveKeys() {
      showToast('Ключи сохранены', 'success');
    }

    // Clear validation on input
    document.querySelectorAll('.field input').forEach(inp => {
      inp.addEventListener('input', () => {
        inp.style.borderColor = '';
        const err = document.getElementById(inp.id + '-error');
        if (err) err.style.display = 'none';
      });
    });

    // Keyboard
    document.addEventListener('keydown', e => {
      if (e.key === 'Escape') {
        document.querySelectorAll('.modal-backdrop[style*="display: flex"]').forEach(m => closeModal(m.dataset.modal));
      }
    });
  </script>
</body>
</html>
